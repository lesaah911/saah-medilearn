global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 2000
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

#---------------------------------------------------------------------
# Frontend HTTP — redirige vers HTTPS
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    redirect scheme https code 301

#---------------------------------------------------------------------
# Frontend HTTPS — reçoit les connexions sécurisées
#---------------------------------------------------------------------
frontend https_front
    bind *:443 ssl crt /etc/ssl/saah-medilearn/saah-medilearn.pem
    default_backend saah_medilearn_back

#---------------------------------------------------------------------
# Backend — distribue vers les serveurs web
#---------------------------------------------------------------------
backend saah_medilearn_back
    balance roundrobin
    option httpchk GET /
    server vm-serv1 192.168.56.11:80 check
    server vm-serv2 192.168.56.12:80 check